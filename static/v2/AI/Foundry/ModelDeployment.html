	const connection    = section.querySelector('.chatflow-connection');
	const reqLabel      = section.querySelector('.chatflow-req-label');
	const respLabel     = section.querySelector('.chatflow-resp-label');
	const connTokenPill = section.querySelector('.chatflow-conn-token');
	const connTokenCount= section.querySelector('.chatflow-conn-token-count');
	const foundryBox    = section.querySelector('.chatflow-foundry');
	const cfBoxes       = section.querySelectorAll('.cf-box');
	const deployChip    = section.querySelector('.cf-deploy-chip');
	const endpointBox   = section.querySelector('.chatflow-endpoint-box');
	const gearEl        = section.querySelector('.chatflow-gear');
	const tokenDisplay  = section.querySelector('.chatflow-token-display');
	const visualTokenCount = section.querySelector('.chatflow-visual-token-count');
	const closingEl     = section.querySelector('.chatflow-closing');

	// Start alternating glow on labels
	function startLabelGlow() {
		reqLabel.classList.add('glowing');
		respLabel.classList.add('glowing');
		connTokenPill.classList.add('glowing');
	}

	// Animated token counter in foundry visual
	let tokenCount = 0;
	function startTokenCounter() {
		gsap.to(tokenDisplay, { opacity:1, duration:0.3 });
		window._chatflowTokenInterval = setInterval(() => {
			tokenCount += Math.floor(Math.random() * 4) + 1;
			visualTokenCount.textContent = tokenCount.toLocaleString();
			connTokenCount.textContent = tokenCount.toLocaleString();
		}, 2000);
	}
	function stopTokenCounter() {
		if (window._chatflowTokenInterval) { clearInterval(window._chatflowTokenInterval); window._chatflowTokenInterval = null; }
	}

	if (motionPaused) {
		gsap.set(section, { opacity:1 });
		gsap.set([titleEl, leadEl, layout, browser, foundryBox, closingEl], { opacity:1 });
		gsap.set(chatWidget, { opacity:1 });
		gsap.set(msgs, { opacity:1 });
		gsap.set(codeArea, { opacity:1 });
		gsap.set([reqLabel, respLabel, connTokenPill], { opacity:1 });
		startLabelGlow();
		gsap.set(cfBoxes, { opacity:1 });
		gsap.set([deployChip, endpointBox], { opacity:1 });
		startTokenCounter();
		startLabelGlow();
		gearEl.classList.add('spinning');
		if (calloutEl) gsap.set(calloutEl, { opacity:1 });
		animating = false;
	} else {
		const tl = gsap.timeline({ onComplete: () => { animating = false; } });
		tl.timeScale(0.45);
		liveTimelines.push(tl);

		tl.set(section, { opacity:1 });

		// Title + lead
		tl.fromTo(titleEl, { opacity:0, y:-20 }, { opacity:1, y:0, duration:1.0, ease:'power2.out' });
		tl.fromTo(leadEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.6, ease:'power2.out' }, '-=0.5');

		// Browser frame slides in from left
		tl.fromTo(browser, { opacity:0, x:-40 }, { opacity:1, x:0, duration:0.8, ease:'power2.out' }, '+=0.2');

		// Foundry box slides in from right
		tl.fromTo(foundryBox, { opacity:0, x:40 }, { opacity:1, x:0, duration:0.8, ease:'power2.out' }, '-=0.6');

		// Nested boxes cascade in
		cfBoxes.forEach((box, i) => {
			tl.fromTo(box, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.4, ease:'power2.out' }, i === 0 ? '-=0.3' : '-=0.25');
		});
		// Deploy chip pops
		tl.fromTo(deployChip, { opacity:0, scale:0.7 }, { opacity:1, scale:1, duration:0.4, ease:'back.out(2.0)' }, '-=0.2');
		tl.fromTo(endpointBox, { opacity:0, y:8 }, { opacity:1, y:0, duration:0.4, ease:'power2.out' }, '-=0.15');

		// Chat widget appears
		tl.fromTo(chatWidget, { opacity:0, y:20, scale:0.9 }, { opacity:1, y:0, scale:1, duration:0.6, ease:'back.out(1.8)' }, '-=0.2');

		// Chat message 1 (user) types in
		tl.fromTo(msgs[0], { opacity:0, y:10, scale:0.9 }, { opacity:1, y:0, scale:1, duration:0.4, ease:'back.out(1.5)' }, '+=0.3');

		// Request label appears + glow
		tl.fromTo(reqLabel, { opacity:0, scale:0.8 }, { opacity:1, scale:1, duration:0.4, ease:'back.out(1.5)' }, '+=0.1');

		// Token pill appears between labels
		tl.fromTo(connTokenPill, { opacity:0, scale:0.7 }, { opacity:1, scale:1, duration:0.4, ease:'back.out(1.5)' }, '-=0.1');

		// Gear starts spinning + token counter
		tl.add(() => { gearEl.classList.add('spinning'); startTokenCounter(); startLabelGlow(); });

		// Chat message 1 (bot) response
		tl.fromTo(msgs[1], { opacity:0, y:10, scale:0.9 }, { opacity:1, y:0, scale:1, duration:0.4, ease:'back.out(1.5)' }, '-=0.1');

		// Response label appears
		tl.fromTo(respLabel, { opacity:0, scale:0.8 }, { opacity:1, scale:1, duration:0.4, ease:'back.out(1.5)' }, '+=0.1');

		// Chat message 2 (user)
		tl.fromTo(msgs[2], { opacity:0, y:10, scale:0.9 }, { opacity:1, y:0, scale:1, duration:0.4, ease:'back.out(1.5)' }, '+=0.3');

		// Chat message 2 (bot)
		tl.fromTo(msgs[3], { opacity:0, y:10, scale:0.9 }, { opacity:1, y:0, scale:1, duration:0.4, ease:'back.out(1.5)' }, '-=0.1');

		// Code snippet reveals
		tl.fromTo(codeArea, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.7, ease:'power2.out' }, '+=0.2');

		// Closing
		tl.fromTo(closingEl, { opacity:0, y:15 }, { opacity:1, y:0, duration:0.9, ease:'power2.out' }, '+=0.3');

		// Callout
		if (calloutEl) tl.fromTo(calloutEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.8, ease:'power2.out' }, '-=0.6');
	}
}

				<svg class="agentneed-arrow" viewBox="0 0 150 74" aria-hidden="true" focusable="false">
					<line class="agentneed-arrow-line" x1="8" y1="37" x2="120" y2="37" />
					<polygon class="agentneed-arrow-head" points="120,24 144,37 120,50" />
				</svg>
			</div>

			<div class="agentneed-panel agentneed-agent">
				<div class="agentneed-panel-header">
					<span class="agentneed-panel-icon agentneed-robot-emoji" aria-hidden="true">🤖</span>
					<div>
						<div class="agentneed-panel-kicker">${t('agentNeedAgentKicker')}</div>
						<div class="agentneed-panel-title">${t('agentNeedAgentTitle')}</div>
					</div>
				</div>
				<div class="agentneed-agent-body">
					<p class="agentneed-agent-copy">${t('agentNeedAgentCopy')}</p>
					<div class="agentneed-cap-grid">
						${capabilities.map(capability => `
							<div class="agentneed-cap" data-cap="${capability.key}">
								<span class="agentneed-cap-icon">${capability.icon}</span>
								<div>
									<strong>${t(capability.title)}</strong>
									<span>${t(capability.desc)}</span>
								</div>
							</div>
						`).join('')}
					</div>
				</div>
			</div>
		</div>

		<div class="agentneed-closing">${t('agentNeedClosing')}</div>
	`;
	stage.appendChild(section);
	liveEls.push(section);

	let calloutEl = null;
	if (calloutEnabled) {
		calloutEl = document.createElement('div');
		calloutEl.className = 'callout';
		calloutEl.innerHTML = t('agentNeedCallout');
		calloutEl.style.left = '1.5rem';
		calloutEl.style.top = '1.5rem';
		calloutEl.style.right = 'auto';
		calloutEl.style.bottom = 'auto';
		calloutEl.style.transform = 'none';
		calloutEl.style.maxWidth = '380px';
		stage.appendChild(calloutEl);
		liveEls.push(calloutEl);
	}

	const titleEl = section.querySelector('.agentneed-title');
	const leadEl = section.querySelector('.agentneed-lead');
	const deployApp = section.querySelector('.agentneed-webapp');
	const agentPanel = section.querySelector('.agentneed-agent');
	const webChat = section.querySelector('.agentneed-web-chat');
	const messages = section.querySelectorAll('.agentneed-msg');
	const userMessages = section.querySelectorAll('.agentneed-msg-user');
	const modelMessage = section.querySelector('.agentneed-msg-model');
	const xMarks = section.querySelectorAll('.agentneed-msg-x');
	const riskLabel = section.querySelector('.agentneed-risk-label');
	const topicChips = section.querySelectorAll('.agentneed-topic-chip');
	const bridge = section.querySelector('.agentneed-bridge');
	const arrowLine = section.querySelector('.agentneed-arrow-line');
	const arrowHead = section.querySelector('.agentneed-arrow-head');
	const agentCopy = section.querySelector('.agentneed-agent-copy');
	const capabilityCards = section.querySelectorAll('.agentneed-cap');
	const closingEl = section.querySelector('.agentneed-closing');
	const arrowLength = 112;

	function startArrowMarch() {
		arrowLine.style.strokeDasharray = '8 5';
		arrowLine.style.strokeDashoffset = '0';
		arrowLine.classList.add('marching');
	}

	arrowLine.style.strokeDasharray = arrowLength;
	arrowLine.style.strokeDashoffset = arrowLength;
	arrowHead.style.opacity = 0;

	if (motionPaused) {
		gsap.set(section, { opacity:1 });
		gsap.set([titleEl, leadEl, deployApp, agentPanel, webChat, messages, xMarks, riskLabel, topicChips, bridge, agentCopy, capabilityCards, closingEl], { opacity:1 });
		gsap.set(xMarks, { scale:1, rotation:0 });
		arrowLine.style.strokeDashoffset = 0;
		arrowHead.style.opacity = 1;
		startArrowMarch();
		if (calloutEl) gsap.set(calloutEl, { opacity:1 });
		animating = false;
	} else {
		const tl = gsap.timeline({ onComplete: () => animating = false });
		tl.timeScale(0.34);
		liveTimelines.push(tl);

		tl.set(section, { opacity:1 });
		tl.fromTo(titleEl, { opacity:0, y:-20 }, { opacity:1, y:0, duration:1.0, ease:'power2.out' });
		tl.fromTo(leadEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.7, ease:'power2.out' }, '-=0.45');
		tl.fromTo(deployApp, { opacity:0, x:-36 }, { opacity:1, x:0, duration:0.8, ease:'power2.out' }, '+=0.2');
		tl.fromTo(webChat, { opacity:0, y:18, scale:0.96 }, { opacity:1, y:0, scale:1, duration:0.55, ease:'back.out(1.5)' }, '-=0.15');
		tl.fromTo(riskLabel, { opacity:0, y:8 }, { opacity:1, y:0, duration:0.5, ease:'power2.out' }, '+=0.25');
		userMessages.forEach((message, index) => {
			const xMark = message.querySelector('.agentneed-msg-x');
			const topicChip = topicChips[index];
			tl.fromTo(message, { opacity:0, y:14, scale:0.92 }, { opacity:1, y:0, scale:1, duration:0.58, ease:'back.out(1.5)' }, '+=0.35');
			tl.fromTo(xMark, { opacity:0, scale:0.35, rotation:-18 }, { opacity:1, scale:1, rotation:0, duration:0.38, ease:'back.out(2.4)' }, '-=0.08');
			tl.fromTo(topicChip, { opacity:0, y:8, scale:0.82 }, { opacity:1, y:0, scale:1, duration:0.42, ease:'back.out(1.8)' }, '+=0.15');
		});
		tl.fromTo(modelMessage, { opacity:0, y:12, scale:0.92 }, { opacity:1, y:0, scale:1, duration:0.55, ease:'back.out(1.5)' }, '+=0.45');
		tl.fromTo(bridge, { opacity:0, scale:0.92 }, { opacity:1, scale:1, duration:0.55, ease:'power2.out' }, '+=0.15');
		tl.to(arrowLine, { strokeDashoffset:0, duration:0.55, ease:'power2.inOut' });
		tl.to(arrowHead, { opacity:1, duration:0.25, ease:'power2.out', onComplete:startArrowMarch }, '-=0.1');
		tl.fromTo(agentPanel, { opacity:0, x:36 }, { opacity:1, x:0, duration:0.85, ease:'power2.out' }, '-=0.2');
		tl.fromTo(agentCopy, { opacity:0, y:8 }, { opacity:1, y:0, duration:0.45, ease:'power2.out' }, '-=0.25');
		tl.fromTo(capabilityCards, { opacity:0, y:14, scale:0.92 }, { opacity:1, y:0, scale:1, duration:0.5, stagger:0.12, ease:'back.out(1.5)' }, '-=0.05');
		tl.fromTo(closingEl, { opacity:0, y:14 }, { opacity:1, y:0, duration:0.75, ease:'power2.out' }, '+=0.2');
		if (calloutEl) tl.fromTo(calloutEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.75, ease:'power2.out' }, '-=0.5');
	}
}

// ── CONTROLS ───────────────────────────────
function interruptAnimation() {
	liveTimelines.forEach(t => t.kill());
	liveTimelines = [];
	animating = false;
}
function next()   { interruptAnimation(); if (current < STEPS.length-1) renderStep(current+1); }
function prev()   { interruptAnimation(); if (current > 0) renderStep(current-1); }
function reset()  { interruptAnimation(); renderStep(0); }
function replay() { if (current < 0) return; interruptAnimation(); renderStep(current); }

document.getElementById('next-btn').addEventListener('click', e => { e.stopPropagation(); next(); });
document.getElementById('prev-btn').addEventListener('click', e => { e.stopPropagation(); prev(); });
document.getElementById('reset-btn').addEventListener('click', e => { e.stopPropagation(); reset(); });
document.getElementById('replay-btn').addEventListener('click', e => { e.stopPropagation(); replay(); });

// ── Speed control ────────────────────────
const SPEED_STEPS = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIndex = SPEED_STEPS.indexOf(1);
const speedLabel = document.getElementById('speed-label');
const speedDownBtn = document.getElementById('speed-down');
const speedUpBtn   = document.getElementById('speed-up');
function syncSpeedUI() {
	const spd = SPEED_STEPS[speedIndex];
	speedLabel.textContent = spd + '\u00d7';
	speedDownBtn.disabled = speedIndex === 0;
	speedUpBtn.disabled   = speedIndex === SPEED_STEPS.length - 1;
	gsap.globalTimeline.timeScale(spd);
}
syncSpeedUI();
speedDownBtn.addEventListener('click', e => { e.stopPropagation(); if (speedIndex > 0) { speedIndex--; syncSpeedUI(); } });
speedUpBtn.addEventListener('click', e => { e.stopPropagation(); if (speedIndex < SPEED_STEPS.length-1) { speedIndex++; syncSpeedUI(); } });

// ── Keyboard ──────────────────────────────
if (window.AW && AW.keyboard) {
	AW.keyboard.bind({ next, prev, reset, replay });
} else {
	document.addEventListener('keydown', e => {
		if (['Space','ArrowRight','Enter'].includes(e.code)) { e.preventDefault(); next(); }
		else if (e.code === 'ArrowLeft') { e.preventDefault(); prev(); }
		else if (e.code === 'KeyR') { e.preventDefault(); reset(); }
		else if (e.code === 'KeyP') { e.preventDefault(); replay(); }
	});
}

// ── Resize ────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
	clearTimeout(resizeTimer);
	resizeTimer = setTimeout(() => renderStep(current), 200);
});

// ── Init ──────────────────────────────────
setLanguage(currentLang);
counter.textContent = `1 / ${STEPS.length}`;
renderStep(0);
</script>

</body>
</html>
