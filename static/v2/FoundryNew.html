<!DOCTYPE html>
<html lang="en">
<head>
	<script src="/js/tracking.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Microsoft Foundry — New Experience</title>

<link rel="stylesheet" href="https://unpkg.com/@microsoft/atlas-css/dist/index.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- AnimationWorks shared lib -->
<script src="lib/js/aw-easings.js"></script>
<script src="lib/js/aw-motion.js"></script>
<script src="lib/js/aw-theme.js"></script>
<script src="lib/js/aw-keyboard.js"></script>

<style>
	html, body { height:100%; margin:0; }
	html { font-size:100%; }
	body {
		display:flex; flex-direction:column;
		min-height:100vh;
		overflow-x:hidden; overflow-y:auto;
		padding-bottom:6rem;
		background:
			radial-gradient(circle at 15% 20%, rgba(92,45,145,0.18) 0%, transparent 55%),
			radial-gradient(circle at 85% 80%, rgba(0,120,212,0.18) 0%, transparent 55%),
			var(--theme-body-background);
		color: var(--theme-text);
	}

	.app-header { display:flex; align-items:center; gap:1rem; flex-shrink:0; flex-wrap:wrap; font-size:16px; }

	#stage {
		position:relative; flex:1 1 auto; width:100%;
		min-height:720px;
		overflow:auto;
	}
	#stage:focus-visible, button:focus-visible, a:focus-visible {
		outline:2px solid var(--theme-primary, #0078d4);
		outline-offset:3px; border-radius:4px;
	}

	#fx-svg {
		position:absolute; inset:0; width:100%; height:100%;
		pointer-events:none; z-index:6; overflow:visible;
	}

	/* ── CALLOUT ─────────────────────────────── */
	.callout {
		position:absolute;
		max-width:340px;
		padding:1rem 1.2rem;
		background:var(--theme-body-background);
		border:1px solid var(--theme-border);
		border-left:4px solid var(--theme-tertiary, #5c2d91);
		border-radius:6px;
		box-shadow: var(--theme-box-shadow-medium, 0 4px 16px rgba(0,0,0,0.2));
		font-size:1.05rem; line-height:1.45;
		z-index:14; opacity:0;
	}

	/* ── BROWSER CARD (portal step) ──────── */
	.browser-card {
		width:min(600px, 100%);
		margin-top:0.8rem;
		background:var(--theme-body-background);
		border:1.5px solid var(--theme-border);
		border-radius:8px;
		box-shadow: var(--theme-box-shadow-medium, 0 6px 24px rgba(0,0,0,0.2));
		z-index:11;
		overflow:hidden;
		opacity:0;
		position:relative;
	}
	.browser-card .browser-chrome {
		display:flex; align-items:center; gap:0.5rem;
		padding:0.4rem 0.6rem;
		background:var(--theme-border);
		border-bottom:1px solid var(--theme-border);
	}
	.browser-card .browser-tab {
		display:flex; align-items:center; gap:0.4rem;
		padding:0.25rem 0.7rem;
		font-size:0.75rem; font-weight:500;
		background:var(--theme-body-background);
		border-radius:6px 6px 0 0;
		border:1px solid var(--theme-border);
		border-bottom:none;
		color:var(--theme-text);
	}
	.browser-card .browser-tab .tab-icon {
		width:14px; height:14px;
	}
	.browser-card .browser-url-bar {
		flex:1;
		display:flex; align-items:center; gap:0.4rem;
		padding:0.2rem 0.6rem;
		font-size:0.78rem; font-weight:500;
		background:var(--theme-body-background);
		border-radius:4px;
		border:1px solid var(--theme-border);
		color:var(--theme-text-subtle);
	}
	.browser-card .browser-url-bar .url-lock { font-size:0.7rem; }
	.browser-card .browser-win-btns {
		display:flex; align-items:center; gap:0;
		margin-left:auto;
	}
	.browser-card .browser-win-btns span {
		display:inline-flex; align-items:center; justify-content:center;
		width:28px; height:22px;
		font-size:0.75rem; font-weight:400;
		color:var(--theme-text-subtle);
		cursor:default;
	}
	.browser-card .browser-win-btns span:hover { background:rgba(128,128,128,0.2); }
	.browser-card .browser-win-btns span.win-close:hover { background:#e81123; color:#fff; }
	.browser-card .browser-content {
		padding:1rem 1.2rem;
	}
	.browser-card .browser-topbar {
		display:flex; align-items:center; justify-content:space-between;
		padding-bottom:0.8rem;
		border-bottom:1px solid var(--theme-border);
		margin-bottom:0.8rem;
	}
	.browser-card .browser-logo {
		font-size:1.1rem; font-weight:700;
		color:var(--theme-text);
	}
	.browser-card .browser-toggle-area {
		display:flex; align-items:center; gap:0.5rem;
		position:relative;
		padding:0.3rem 0.5rem;
		border:2.5px solid #e81123;
		border-radius:6px;
		animation: highlightPulse 1.5s ease-in-out infinite;
	}
	@keyframes highlightPulse {
		0%, 100% { border-color:#e81123; box-shadow:0 0 0 0 rgba(232,17,35,0.3); }
		50% { border-color:#ff4d5e; box-shadow:0 0 8px 3px rgba(232,17,35,0.25); }
	}
	.browser-card .browser-cursor {
		position:absolute;
		bottom:-1.2rem; right:-0.8rem;
		font-size:1.4rem;
		animation: cursorBounce 1.2s ease-in-out infinite;
		z-index:2;
	}
	@keyframes cursorBounce {
		0%, 100% { transform:translate(0,0); }
		50% { transform:translate(-3px, -4px); }
	}
	.browser-card .browser-toggle-label {
		font-size:0.9rem; font-weight:600;
		color:var(--theme-text);
	}
	.browser-card .browser-toggle-switch {
		width:40px; height:22px;
		border-radius:999px;
		background:var(--theme-tertiary, #5c2d91);
		position:relative;
		display:inline-block;
	}
	.browser-card .browser-toggle-knob {
		position:absolute;
		top:3px; right:4px;
		width:16px; height:16px;
		border-radius:50%;
		background:#fff;
	}
	.browser-card .browser-message {
		font-size:0.92rem; line-height:1.5;
		color:var(--theme-text);
	}
	.browser-card .browser-message p { margin:0 0 0.4rem; }
	.browser-card .browser-hint {
		font-size:0.8rem; color:var(--theme-text-subtle); font-weight:500;
	}
	.browser-card .foundry-portal-icon {
		display:inline-flex; align-items:center;
		margin-left:1rem;
		opacity:0;
		vertical-align:middle;
	}
	.browser-card .foundry-portal-icon img {
		width:28px; height:28px;
		filter: drop-shadow(0 2px 6px rgba(92,45,145,0.35));
	}

	/* ── SUMMARY SECTION (portal layout) ──── */
	.summary-section {
		position:absolute;
		top:2%; left:50%; transform:translateX(-50%);
		width:min(1000px, 94%);
		z-index:10;
		opacity:0;
		display:flex; flex-direction:column; align-items:center;
	}
	.summary-new-foundry-text {
		text-align:center;
		margin-top:1rem;
		font-size:1.15rem; line-height:1.5;
		color:var(--theme-text);
		max-width:700px;
	}
	.summary-new-foundry-text strong {
		color:var(--theme-tertiary, #5c2d91);
	}

	/* ── RESOURCES SECTION (step 2) ──────── */
	.resources-section {
		position:absolute;
		top:3%; left:50%; transform:translateX(-50%);
		width:min(1100px, 96%);
		z-index:10;
		opacity:0;
		display:flex; flex-direction:column; align-items:center;
		gap:1.4rem;
	}
	.resources-title {
		font-size:2.6rem; font-weight:700;
		color:var(--theme-tertiary, #5c2d91);
		margin:0; text-align:center;
	}
	.resources-subtitle {
		margin:0; text-align:center;
		font-size:1.5rem; color:var(--theme-text);
		max-width:920px; line-height:1.55;
	}
	.resources-subtitle ul {
		list-style:none; padding:0;
		margin:1rem auto 0; max-width:760px;
		text-align:left;
		display:flex; flex-direction:column; gap:0.6rem;
	}
	.resources-subtitle li {
		position:relative;
		padding:0.6rem 0.9rem 0.6rem 2rem;
		background: rgba(0,120,212,0.06);
		border-left:3px solid var(--theme-primary, #0078d4);
		border-radius:6px;
		font-size:1.35rem; line-height:1.45;
	}
	.resources-subtitle li::before {
		content:'▸';
		position:absolute; left:0.7rem; top:0.55rem;
		color:var(--theme-primary, #0078d4);
		font-weight:bold;
	}
	.resource-parent {
		position:relative;
		width:min(680px, 92%);
		padding:2rem 2rem 1.8rem;
		background: linear-gradient(135deg, rgba(92,45,145,0.06), rgba(0,120,212,0.06));
		border:2.5px dashed var(--theme-tertiary, #5c2d91);
		border-radius:18px;
		opacity:0;
	}
	.resource-badge {
		position:absolute;
		top:-1.1rem; right:1.4rem;
		padding:0.4rem 1rem;
		background:#d83b01; color:#fff;
		font-size:1.05rem; font-weight:700;
		letter-spacing:0.08em; text-transform:uppercase;
		border-radius:999px;
		box-shadow:0 4px 12px rgba(216,59,1,0.35);
	}
	.resource-header {
		display:flex; align-items:center; gap:0.9rem;
		padding-bottom:1rem;
		border-bottom:1px solid var(--theme-border);
	}
	.resource-header img {
		width:72px; height:72px;
		filter: drop-shadow(0 2px 6px rgba(92,45,145,0.3));
		flex-shrink:0;
	}
	.resource-title {
		font-size:1.75rem; font-weight:700;
		color:var(--theme-text);
	}
	.resource-subtitle {
		font-size:1.25rem; color:var(--theme-text-subtle);
		margin-top:0.2rem;
	}
	.resource-child {
		margin-top:1rem;
		display:flex; align-items:center; gap:0.9rem;
		padding:0.9rem 1rem;
		background:var(--theme-body-background);
		border:2px solid var(--theme-primary, #0078d4);
		border-radius:12px;
		box-shadow:0 4px 14px rgba(0,120,212,0.18);
		opacity:0;
	}
	.resource-child img {
		width:58px; height:58px;
		filter: drop-shadow(0 2px 4px rgba(0,120,212,0.3));
		flex-shrink:0;
	}
	.resource-child .resource-title { font-size:1.5rem; }
	.resource-child .resource-subtitle { font-size:1.15rem; }
	.included-services {
		width:min(900px, 96%);
		display:flex; flex-direction:column; align-items:center;
		gap:0.8rem;
		opacity:0;
	}
	.included-label {
		font-size:1.4rem; font-weight:600;
		color:var(--theme-text);
		text-align:center;
	}
	.included-label strong {
		color:var(--theme-tertiary, #5c2d91);
	}
	.service-grid {
		display:flex; flex-wrap:wrap; justify-content:center;
		gap:0.7rem;
	}
	.service-chip {
		display:flex; align-items:center; gap:0.7rem;
		padding:0.8rem 1.3rem;
		background:var(--theme-body-background);
		border:1.5px solid var(--theme-border);
		border-radius:999px;
		font-size:1.3rem; font-weight:600;
		color:var(--theme-text);
		box-shadow:0 2px 8px rgba(0,0,0,0.08);
		opacity:0;
	}
	.service-chip img {
		width:36px; height:36px;
	}

	/* ── MODELS SECTION (step 3) ─────────── */
	.models-section {
		position:absolute;
		top:3%; left:50%; transform:translateX(-50%);
		width:min(1100px, 96%);
		z-index:10;
		opacity:0;
		display:flex; flex-direction:column; align-items:center;
		gap:1.6rem;
	}
	.models-title {
		font-size:2.6rem; font-weight:700;
		color:var(--theme-tertiary, #5c2d91);
		margin:0; text-align:center;
	}
	.models-lead {
		margin:0; text-align:center;
		font-size:1.4rem; color:var(--theme-text);
		max-width:800px; line-height:1.5;
	}
	.models-grid {
		display:flex; flex-wrap:wrap; justify-content:center;
		gap:1rem;
		max-width:960px;
	}
	.company-card {
		display:flex; flex-direction:column;
		gap:0.8rem;
		padding:1.4rem 1.6rem;
		background:var(--theme-body-background);
		border:2px solid var(--theme-border);
		border-radius:14px;
		box-shadow:0 3px 12px rgba(0,0,0,0.08);
		width:220px; flex:0 0 220px;
		opacity:0;
		transition:border-color 0.3s ease, box-shadow 0.3s ease;
	}
	.company-card:hover {
		box-shadow:0 6px 24px rgba(0,0,0,0.15);
	}
	.company-header {
		display:flex; align-items:center; gap:0.7rem;
		padding-bottom:0.5rem;
		border-bottom:1px solid var(--theme-border);
	}
	.company-logo {
		width:36px; height:36px;
		object-fit:contain;
		border-radius:6px;
	}
	.company-name {
		font-size:1.15rem; font-weight:700;
		color:#000;
		white-space:nowrap;
	}
	.company-models {
		display:flex; flex-direction:column;
		gap:0.35rem;
	}
	.company-model-item {
		display:flex; align-items:center; gap:0.5rem;
		padding:0.35rem 0.6rem;
		border-radius:8px;
		background:rgba(0,0,0,0.03);
	}
	.model-item-logo {
		width:24px; height:24px;
		object-fit:contain;
		border-radius:4px;
	}
	.model-item-name {
		font-size:1.05rem; font-weight:600;
		color:var(--theme-text);
	}
	.company-card[data-provider="microsoft"] { border-color:#5c2d91; }
	.company-card[data-provider="anthropic"] { border-color:#d4956a; }
	.company-card[data-provider="openai"] { border-color:#10a37f; }
	.company-card[data-provider="meta"] { border-color:#0668e1; }
	.company-card[data-provider="mistral"] { border-color:#ff7000; }
	.company-card[data-provider="deepseek"] { border-color:#4a90d9; }
	.models-more {
		font-size:1.35rem; font-weight:600;
		color:var(--theme-text-subtle);
		padding:0.8rem 1.6rem;
		border:2px dashed var(--theme-border);
		border-radius:14px;
		width:220px; flex:0 0 220px;
		display:flex; align-items:center; justify-content:center;
		opacity:0;
	}

	/* ── AGENT CTA (inside models step) ──── */
	.agent-cta-wrapper {
		display:flex; flex-direction:column; align-items:center;
		gap:0.6rem;
		margin-top:0.4rem;
		opacity:0;
	}
	.agent-flow-arrow {
		font-size:2rem;
		color:var(--theme-tertiary, #5c2d91);
		animation: agentArrowPulse 1.4s ease-in-out infinite;
	}
	@keyframes agentArrowPulse {
		0%, 100% { transform:translateY(0); opacity:0.5; }
		50% { transform:translateY(5px); opacity:1; }
	}
	.agent-cta-label {
		font-size:1.2rem; font-weight:600;
		color:var(--theme-text-subtle);
		letter-spacing:0.04em;
	}
	.agent-card {
		display:flex; align-items:center; gap:1.2rem;
		padding:1.4rem 2.2rem;
		background: linear-gradient(135deg, rgba(92,45,145,0.10), rgba(0,120,212,0.10));
		border:2.5px solid var(--theme-tertiary, #5c2d91);
		border-radius:18px;
		box-shadow:0 6px 28px rgba(92,45,145,0.18);
		opacity:0;
		position:relative;
		overflow:visible;
	}
	.agent-card::before {
		content:'';
		position:absolute; inset:0;
		background: linear-gradient(135deg, rgba(92,45,145,0.05), rgba(0,120,212,0.08));
		opacity:0;
		animation: agentShimmer 3s ease-in-out infinite;
	}
	@keyframes agentShimmer {
		0%, 100% { opacity:0; }
		50% { opacity:1; }
	}
	.agent-icon {
		font-size:3.2rem;
		line-height:1;
		filter: drop-shadow(0 2px 8px rgba(92,45,145,0.4));
		animation: agentBounce 2s ease-in-out infinite;
		position:relative; z-index:1;
	}
	@keyframes agentBounce {
		0%, 100% { transform:translateY(0) scale(1); }
		30% { transform:translateY(-6px) scale(1.08); }
		60% { transform:translateY(2px) scale(0.97); }
	}
	.agent-card-text {
		display:flex; flex-direction:column; gap:0.2rem;
		position:relative; z-index:1;
	}
	.agent-card-text .agent-title {
		font-size:1.8rem; font-weight:700;
		color:var(--theme-tertiary, #5c2d91);
	}
	.agent-card-text .agent-subtitle {
		font-size:1.3rem; color:var(--theme-text);
		max-width:480px; line-height:1.45;
	}
	.agent-sparkles {
		position:absolute;
		top:-6px; right:-6px;
		font-size:1.4rem;
		animation: sparkleRotate 4s linear infinite;
		z-index:2;
	}
	@keyframes sparkleRotate {
		0% { transform:rotate(0deg) scale(1); opacity:0.7; }
		25% { transform:rotate(90deg) scale(1.2); opacity:1; }
		50% { transform:rotate(180deg) scale(1); opacity:0.7; }
		75% { transform:rotate(270deg) scale(1.2); opacity:1; }
		100% { transform:rotate(360deg) scale(1); opacity:0.7; }
	}

	/* dark overrides for agent card */
	body.theme-dark .agent-card {
		background: linear-gradient(135deg, rgba(146,78,217,0.15), rgba(80,170,255,0.12));
		border-color:#a67dd8;
		box-shadow:0 6px 28px rgba(146,78,217,0.25);
	}
	body.theme-dark .agent-card-text .agent-title { color:#c9a5e8; }
	body.theme-dark .agent-flow-arrow { color:#c9a5e8; }

	/* dark overrides for models */
	body.theme-dark .models-title { color:#c9a5e8; }
	body.theme-dark .company-card { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.15); }
	body.theme-dark .company-model-item { background:rgba(255,255,255,0.06); }
	body.theme-dark .company-card .company-name { color:#fff; }
	body.theme-dark .company-card[data-provider="microsoft"] { border-color:#a67dd8; }
	body.theme-dark .company-card[data-provider="anthropic"] { border-color:#d4956a; }
	body.theme-dark .company-card[data-provider="openai"] { border-color:#10a37f; }
	body.theme-dark .company-card[data-provider="meta"] { border-color:#5b9ef0; }
	body.theme-dark .company-card[data-provider="mistral"] { border-color:#ff8c33; }
	body.theme-dark .company-card[data-provider="deepseek"] { border-color:#6eb0ee; }
	body.theme-dark .models-more { color:var(--theme-text-subtle); border-color:rgba(255,255,255,0.15); }

	/* ── FEATURES SECTION (step 4) ────────── */
	.features-section {
		position:absolute;
		top:3%; left:50%; transform:translateX(-50%);
		width:min(1100px, 96%);
		z-index:10;
		opacity:0;
		display:flex; flex-direction:column; align-items:center;
		gap:1.6rem;
	}
	.features-title {
		font-size:2.6rem; font-weight:700;
		color:var(--theme-tertiary, #5c2d91);
		margin:0; text-align:center;
	}
	.features-lead {
		margin:0; text-align:center;
		font-size:1.4rem; color:var(--theme-text);
		max-width:800px; line-height:1.5;
	}
	/* Leaderboard card */
	.leaderboard-card {
		width:100%; max-width:1100px;
		background:var(--theme-body-background);
		border:2px solid var(--theme-tertiary, #5c2d91);
		border-radius:16px;
		padding:2rem 2.5rem;
		box-shadow:0 4px 18px rgba(92,45,145,0.12);
		opacity:0;
	}
	.leaderboard-header {
		display:flex; align-items:center; gap:0.7rem;
		margin-bottom:1rem;
	}
	.leaderboard-icon { font-size:2.2rem; }
	.leaderboard-header h3 {
		margin:0; font-size:1.8rem; font-weight:700; color:var(--theme-text);
	}
	.leaderboard-desc {
		font-size:1.2rem; line-height:1.5; color:var(--theme-text);
		margin-bottom:1.4rem;
	}
	.leaderboard-desc a {
		color:var(--theme-primary, #0078d4);
		text-decoration:underline;
	}
	.leaderboard-bars {
		display:flex; gap:2rem;
		justify-content:center;
	}
	.bar-group {
		display:flex; flex-direction:column; align-items:stretch; gap:0.5rem;
		flex:1; min-width:0;
	}
	.bar-group .bar-label {
		font-size:1.1rem; font-weight:700; color:var(--theme-text);
		text-align:center; margin-bottom:0.3rem;
	}
	.bar-row {
		display:flex; align-items:center; gap:0.6rem;
		width:100%;
	}
	.bar-model-label {
		font-size:0.88rem; font-weight:600;
		width:76px; flex-shrink:0;
		text-align:right; color:var(--theme-text);

	/* ── CONTROLS ───────────────────────────── */
	#controls {

		display:inline-flex; align-items:center; gap:0.25rem;

		border:1px solid var(--theme-border);

	.speed-control .speed-btn {
		width:1.9rem; height:1.9rem;
		padding:0; line-height:1;
		font-size:1.15rem; font-weight:700;

	/* ── TOGGLE BUTTONS ── */
	#callout-toggle,
	#outline-toggle {
		border:1px solid var(--theme-border);

	#callout-toggle.toggle-active,
	#outline-toggle.toggle-active {
		background:var(--theme-primary-translucent, rgba(0,120,212,0.12));
		color:var(--theme-primary, #0078d4);
		border-color:var(--theme-primary, #0078d4);
		font-weight:600;
	}
	#callout-toggle:not(.toggle-active),
	#outline-toggle:not(.toggle-active) { opacity:0.6; }

	/* ── OUTLINE PANEL ──────────────────────── */
	#step-outline {
		position:fixed; top:4.5rem; right:1rem;
		width:320px; max-height:calc(100vh - 8rem); overflow-y:auto;
		padding:1.1rem;
		background:var(--theme-body-background);

	.progress-track { position:relative; height:5px; background:var(--theme-border, #e0e0e0); flex-shrink:0; }
	.progress-fill {
		position:absolute; left:0; top:0; bottom:0; width:0%;
		background: #5c2d91;
		transition:width 0.5s cubic-bezier(0.2,0.8,0.2,1);
	}

	/* ── THEME TOGGLE ── */
	.theme-toggle {
		display:inline-flex; align-items:center; justify-content:center;
		width:2.25rem; height:2.25rem;
		padding:0; margin-inline-start:0.25rem;
		background:transparent;
		border:1px solid var(--theme-border);
		border-radius:999px;
		color:var(--theme-text);
		cursor:pointer;
		transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
	}
	.theme-toggle:hover {
		background:var(--theme-primary-translucent, rgba(0,120,212,0.12));
		color:var(--theme-primary);
		border-color:var(--theme-primary);
	}
	.theme-toggle .theme-icon { display:none; }
	.theme-toggle[data-theme="dark"]  .icon-sun  { display:block; }
	.theme-toggle[data-theme="light"] .icon-moon { display:block; }

	/* ── A11Y ─────────────────────────────── */
	.sr-only {
		position:absolute; width:1px; height:1px; padding:0; margin:-1px;
		overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;

		position:absolute; top:-100px; left:0.5rem; z-index:100;

		align-items: center;

	.font-size-btn {

	.font-size-btn:active { transform: scale(0.95); }
	body.theme-dark .font-size-btn {
		background: var(--theme-body-background, #1a1a2e);

	}
	body.theme-dark .font-size-btn:hover { background: rgba(255,255,255,0.08); }

	/* ── DARK-THEME OVERRIDES ───────────────── */

	body.theme-dark #step-outline .stat-row span:last-child { color:#c9a5e8; }

	/* ── RESPONSIVE ─────────────────────────── */
	@media (max-width:1100px), (max-height:720px) {
		#stage { min-width:0; min-height:520px; overflow:visible; }

		*, *::before, *::after {
			transition:none !important; animation:none !important;
		}
		.progress-fill { transition:none !important; }
	}
</style>

// ── Font size controls ────────────────────
const fontScales = [0.8, 0.9, 1, 1.1, 1.2, 1.35];
let fontScaleIdx = 2; // default = 1 (100%)
const fontDecBtn = document.getElementById('font-decrease');
const fontIncBtn = document.getElementById('font-increase');
const baseFontSize = parseFloat(getComputedStyle(document.documentElement).fontSize);

function applyFontScale() {
	document.documentElement.style.fontSize = (baseFontSize * fontScales[fontScaleIdx]) + 'px';
	const controls = document.getElementById('controls');
	if (controls) controls.style.fontSize = (baseFontSize) + 'px';
}
fontDecBtn.addEventListener('click', () => {
	if (fontScaleIdx > 0) { fontScaleIdx--; applyFontScale(); }
});
fontIncBtn.addEventListener('click', () => {
	if (fontScaleIdx < fontScales.length - 1) { fontScaleIdx++; applyFontScale(); }
});

let current = -1;
let animating = false;
let liveEls = [];
let liveTimelines = [];
let calloutEnabled = false;

// ── Callout toggle ────────────────────────
function syncCalloutBtn() {
	calloutBtn.textContent = calloutEnabled ? t('calloutOn') : t('calloutOff');
	calloutBtn.classList.toggle('toggle-active', calloutEnabled);
}
calloutBtn.addEventListener('click', () => {
	calloutEnabled = !calloutEnabled;
	syncCalloutBtn();
	if (current >= 0) renderStep(current);
});
syncCalloutBtn();

// ── Outline toggle ────────────────────────
function syncOutlineBtn() {
	const on = !outlinePanel.hasAttribute('hidden');
	outlineBtn.textContent = on ? t('outlineOn') : t('outlineOff');
	outlineBtn.classList.toggle('toggle-active', on);
}
outlineBtn.addEventListener('click', () => {
	const showing = !outlinePanel.hasAttribute('hidden');
	if (showing) {
		outlinePanel.setAttribute('hidden', '');
		outlineBtn.setAttribute('aria-expanded', 'false');
	} else {
		outlinePanel.removeAttribute('hidden');
		outlineBtn.setAttribute('aria-expanded', 'true');
	}
	syncOutlineBtn();
});
syncOutlineBtn();

// ── Reduced motion ────────────────────────
const motionMQ = window.matchMedia('(prefers-reduced-motion: reduce)');
let motionPaused = motionMQ.matches;
motionMQ.addEventListener('change', e => { motionPaused = e.matches; renderStep(current); });

// ── Helpers ───────────────────────────────
function clearStage() {
	liveTimelines.forEach(t => t.kill());
	liveTimelines = [];
	liveEls.forEach(el => el.remove());
	liveEls = [];
	Array.from(svg.children).forEach(child => {
		if (child.tagName.toLowerCase() !== 'defs') child.remove();
	});
}

// ── Outline + Announce ────────────────────
function stepTitle(step) {
	if (step.id === 'resources') return t('resourcesTitle');
	if (step.id === 'models') return t('modelsTitle');
	if (step.id === 'features') return t('featuresTitle');
	if (step.id === 'overview') return t('overviewTitle');
	return t('summaryTitle');
}
function stepDesc(step) {
	if (step.id === 'resources') return t('resourcesDesc');
	if (step.id === 'models') return t('modelsDesc');
	if (step.id === 'features') return t('featuresDesc');
	if (step.id === 'overview') return t('overviewDesc');
	return t('summaryDesc');
}
function stepCaption(step) {
	if (step.id === 'resources') return t('resourcesCaption');
	if (step.id === 'models') return t('modelsCaption');
	if (step.id === 'features') return t('featuresCaption');
	if (step.id === 'overview') return t('overviewCaption');
	return t('summaryCaption');
}
function renderOutline(step, idx) {
	const statRows = (step.stats||[]).map(([k,v]) => {
		const label = I18N[currentLang] && I18N[currentLang][k] ? t(k) : k;
		return `<div class="stat-row"><span>${label}</span><span>${v}</span></div>`;
	}).join('');
	outlineBody.innerHTML = `
		<div class="outline-section">
			<strong>${t('stepOf')} ${idx+1} / ${STEPS.length}: ${stepTitle(step)}</strong>
			<p style="margin-top:0.4rem;">${stepDesc(step)}</p>
		</div>
		${statRows ? `<div class="outline-section">${statRows}</div>` : ''}
	`;
}
function announceStep(step, idx) {
	announcer.textContent = `${t('stepOf')} ${idx+1} / ${STEPS.length}: ${stepTitle(step)}. ${stepDesc(step)}`;
}

// ── RENDER STEP ───────────────────────────
function renderStep(stepIndex) {
	if (stepIndex < 0 || stepIndex >= STEPS.length) return;
	if (animating) {
		liveTimelines.forEach(t => t.kill());
		liveTimelines = [];
		animating = false;
	}
	animating = true;

	const step = STEPS[stepIndex];
	clearStage();

	if (step.id === 'portal') {
		renderPortalStep();
	} else if (step.id === 'resources') {
		renderResourcesStep();
	} else if (step.id === 'models') {
		renderModelsStep();
	} else if (step.id === 'features') {
		renderFeaturesStep();
	} else if (step.id === 'overview') {
		renderOverviewStep();
	}

	current = stepIndex;
	counter.textContent = `${t('stepOf')} ${current+1} / ${STEPS.length}`;
	breadcrumb.textContent = stepCaption(step);
	progress.style.width = ((current+1)/STEPS.length * 100) + '%';
	renderOutline(step, stepIndex);
	announceStep(step, stepIndex);
}

function renderModelsStep() {
	const companies = [
		{ key: 'microsoft', name: t('modelPhi4Provider'), logo: COMPANY_LOGOS.microsoft, models: [
			{ name: t('modelPhi4') },
			{ name: t('modelMAIVoice') }
		]},
		{ key: 'anthropic', name: t('modelClaudeProvider'), logo: COMPANY_LOGOS.anthropic, models: [
			{ name: t('modelClaude'), logo: MODEL_LOGOS.claude }
		]},
		{ key: 'openai', name: t('modelGPTProvider'), logo: COMPANY_LOGOS.openai, models: [
			{ name: t('modelGPT'), logo: MODEL_LOGOS.gpt }
		]},
		{ key: 'meta', name: t('modelLlamaProvider'), logo: COMPANY_LOGOS.meta, models: [
			{ name: t('modelLlama') }
		]},
		{ key: 'mistral', name: t('modelMistralProvider'), logo: COMPANY_LOGOS.mistral, models: [
			{ name: t('modelMistral') }
		]},
		{ key: 'deepseek', name: t('modelDeepSeekProvider'), logo: COMPANY_LOGOS.deepseek, models: [
			{ name: t('modelDeepSeek') }
		]}
	];

	const section = document.createElement('div');
	section.className = 'models-section';
	section.style.opacity = '1';
	section.innerHTML = `
		<h2 class="models-title">${t('modelsTitle')}</h2>
		<p class="models-lead">${t('modelsLead')}</p>
		<div class="models-grid">
			${companies.map(c => `
				<div class="company-card" data-provider="${c.key}">
					<div class="company-header">
						<img class="company-logo" src="${c.logo}" alt="${c.name}">
						<span class="company-name">${c.name}</span>
					</div>
					<div class="company-models">
						${c.models.map(m => `
							<div class="company-model-item">
								${m.logo ? `<img class="model-item-logo" src="${m.logo}" alt="${m.name}">` : ''}
								<span class="model-item-name">${m.name}</span>
							</div>
						`).join('')}
					</div>
				</div>
			`).join('')}
			<div class="models-more">${t('modelsMore')}</div>
		</div>
		<div class="agent-cta-wrapper">
			<span class="agent-flow-arrow">⬇</span>
			<span class="agent-cta-label">${t('agentCta')}</span>
		</div>
		<div class="agent-card">
			<span class="agent-sparkles">✨</span>
			<span class="agent-icon">🤖</span>
			<div class="agent-card-text">
				<span class="agent-title">${t('agentLabel')}</span>
				<span class="agent-subtitle">${t('agentDesc')}</span>
			</div>
		</div>
	`;
	stage.appendChild(section);
	liveEls.push(section);

	const cards = section.querySelectorAll('.company-card');
	const moreEl = section.querySelector('.models-more');
	const titleEl = section.querySelector('.models-title');
	const leadEl = section.querySelector('.models-lead');
	const ctaWrapper = section.querySelector('.agent-cta-wrapper');
	const agentCard = section.querySelector('.agent-card');

	if (motionPaused) {
		gsap.set([titleEl, leadEl], { opacity:1 });
		gsap.set(cards, { opacity:1 });
		gsap.set(moreEl, { opacity:1 });
		gsap.set(ctaWrapper, { opacity:1 });
		gsap.set(agentCard, { opacity:1 });
		animating = false;
	} else {
		const tl = gsap.timeline({ onComplete: () => animating = false });
		tl.timeScale(0.4);
		liveTimelines.push(tl);
		tl.fromTo(titleEl, { opacity:0, y:-20 }, { opacity:1, y:0, duration:1.0, ease:'power2.out' });
		tl.fromTo(leadEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.8, ease:'power2.out' }, '+=0.3');
		tl.fromTo(cards, { opacity:0, y:20, scale:0.85 }, { opacity:1, y:0, scale:1, duration:0.8, stagger:0.3, ease:'back.out(1.6)' }, '+=0.4');
		tl.fromTo(moreEl, { opacity:0, scale:0.9 }, { opacity:1, scale:1, duration:0.8, ease:'power2.out' }, '+=0.3');
		// Agent CTA flow animation
		tl.fromTo(ctaWrapper, { opacity:0, y:-10 }, { opacity:1, y:0, duration:0.8, ease:'power2.out' }, '+=0.5');
		tl.fromTo(agentCard, { opacity:0, y:30, scale:0.8 }, { opacity:1, y:0, scale:1, duration:1.2, ease:'back.out(2.0)' }, '+=0.3');
		// Extra punch: flash the agent card border
		tl.fromTo(agentCard, { boxShadow:'0 0 0 0 rgba(92,45,145,0)' }, { boxShadow:'0 0 30px 8px rgba(92,45,145,0.35)', duration:0.6, ease:'power2.out' }, '-=0.4');
		tl.to(agentCard, { boxShadow:'0 6px 28px rgba(92,45,145,0.18)', duration:0.8, ease:'power2.inOut' });
	}
}

// ── FEATURES STEP ─────────────────────────
function renderFeaturesStep() {
	const featureTiles = [
		{ icon: '🤖', titleKey: 'agentServiceTitle', descKey: 'agentServiceDesc' },
		{ icon: '🧠', titleKey: 'foundryIQTitle', descKey: 'foundryIQDesc' },
		{ icon: '⚡', titleKey: 'workflowsTitle', descKey: 'workflowsDesc' },
		{ icon: '💻', titleKey: 'foundryLocalTitle', descKey: 'foundryLocalDesc' }
	];

	// Model comparison data for leaderboard
	const models = [
		{ name: 'GPT-4o',     color: '#10a37f', quality: { w:'92%', v:'92'     }, cost: { w:'30%',  v:'$2.50'  }, throughput: { w:'71%',  v:'128 t/s' } },
		{ name: 'Claude 3.5', color: '#d97706', quality: { w:'89%', v:'89'     }, cost: { w:'25%',  v:'$3.00'  }, throughput: { w:'53%',  v:'95 t/s'  } },
		{ name: 'Llama 3.1',  color: '#0078d4', quality: { w:'84%', v:'84'     }, cost: { w:'72%',  v:'$0.60'  }, throughput: { w:'87%',  v:'156 t/s' } },
		{ name: 'Phi-4',      color: '#5c2d91', quality: { w:'78%', v:'78'     }, cost: { w:'95%',  v:'$0.14'  }, throughput: { w:'100%', v:'180 t/s' } }
	];

	function barsHTML(metric) {
		return models.map(m => `
			<div class="bar-row">
				<span class="bar-model-label">${m.name}</span>
				<div class="bar-track">
					<div class="bar-fill" style="background:linear-gradient(90deg, ${m.color}, ${m.color}aa);" data-target="${m[metric].w}">
						<span class="bar-value">${m[metric].v}</span>
					</div>
				</div>
			</div>
		`).join('');
	}

	const section = document.createElement('div');
	section.className = 'features-section';
	section.style.opacity = '1';
	section.innerHTML = `
		<h2 class="features-title">${t('featuresTitle')}</h2>
		<p class="features-lead">${t('featuresLead')}</p>
		<div class="leaderboard-card">
			<div class="leaderboard-header">
				<span class="leaderboard-icon">🏆</span>
				<h3>${t('leaderboardTitle')}</h3>
			</div>
			<p class="leaderboard-desc">${t('leaderboardDesc')} <a href="https://learn.microsoft.com/azure/ai-studio/how-to/model-benchmarks" target="_blank" rel="noopener">${t('leaderboardLearn')}</a></p>
			<div class="leaderboard-bars">
				<div class="bar-group">
					<span class="bar-label">${t('leaderboardQuality')}</span>
					${barsHTML('quality')}
				</div>
				<div class="bar-group">
					<span class="bar-label">${t('leaderboardCost')}</span>
					${barsHTML('cost')}
				</div>
				<div class="bar-group">
					<span class="bar-label">${t('leaderboardThroughput')}</span>
					${barsHTML('throughput')}
				</div>
			</div>
		</div>
		<div class="features-grid">
			${featureTiles.map(f => `
				<div class="feature-tile">
					<span class="feature-tile-icon">${f.icon}</span>
					<div class="feature-tile-text">
						<strong>${t(f.titleKey)}</strong>
						<span>${t(f.descKey)}</span>
					</div>
				</div>
			`).join('')}
		</div>
	`;
	stage.appendChild(section);
	liveEls.push(section);

	const titleEl = section.querySelector('.features-title');
	const leadEl = section.querySelector('.features-lead');
	const lbCard = section.querySelector('.leaderboard-card');
	const bars = section.querySelectorAll('.bar-fill');
	const tiles = section.querySelectorAll('.feature-tile');

	if (motionPaused) {
		gsap.set([titleEl, leadEl], { opacity:1 });
		gsap.set(lbCard, { opacity:1 });
		bars.forEach(b => b.style.width = b.dataset.target);
		gsap.set(tiles, { opacity:1 });
		animating = false;
	} else {
		const tl = gsap.timeline({ onComplete: () => animating = false });
		tl.timeScale(0.4);
		liveTimelines.push(tl);
		tl.fromTo(titleEl, { opacity:0, y:-20 }, { opacity:1, y:0, duration:1.0, ease:'power2.out' });
		tl.fromTo(leadEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.8, ease:'power2.out' }, '+=0.3');
		tl.fromTo(lbCard, { opacity:0, y:20, scale:0.95 }, { opacity:1, y:0, scale:1, duration:1.0, ease:'power2.out' }, '+=0.4');
		// Animate bars growing — stagger across all 12 bars
		bars.forEach((bar, i) => {
			const offset = i === 0 ? '+=0.2' : '-=0.85';
			tl.fromTo(bar, { width:'0%' }, { width: bar.dataset.target, duration:1.0, ease:'power2.out' }, offset);
		});
		// Animate feature tiles
		tl.fromTo(tiles, { opacity:0, y:20, scale:0.85 }, { opacity:1, y:0, scale:1, duration:0.8, stagger:0.25, ease:'back.out(1.6)' }, '+=0.4');
	}
}

// ── OVERVIEW STEP ─────────────────────────
function renderOverviewStep() {
	const capabilities = [
		{ name: 'Agent Service', color: '#2e7d32' },
		{ name: 'Foundry IQ', color: '#5c2d91' },
		{ name: 'Control Plane', color: '#e91e8c' },
		{ name: 'Model Router', color: '#e6a200' },
		{ name: 'Workflows', color: '#0078d4' }
	];

	const capDots = capabilities.map(c =>
		`<span class="cap-dot" style="background:${c.color};"></span>`
	).join('');

	const section = document.createElement('div');
	section.className = 'overview-section';
	section.style.opacity = '1';
	section.innerHTML = `
		<h2 class="overview-title">${t('overviewTitle')}</h2>
		<div class="overview-card">
			<div class="overview-card-header">
				<span class="dot"></span>
				<h3>Microsoft Foundry</h3>
				<span class="overview-badge">${t('overviewBadge')}</span>
			</div>
			<div class="overview-layer">
				<div class="overview-layer-label">${t('overviewSubscription')}</div>
				<div class="overview-layer">
					<div class="overview-layer-label">${t('overviewResourceGroup')}</div>
					<div class="overview-foundry-box">
						<div class="overview-foundry-header">
							<span>⚡</span>
							<strong>${t('overviewFoundryResource')}</strong>
							<span class="paas-label">${t('overviewPaaS')}</span>
						</div>
						<div class="overview-project">
							<span class="overview-project-name"><span class="dot"></span>${t('overviewProjectA')}</span>
							<span class="overview-project-dots">${capDots}</span>
						</div>
						<div class="overview-project">
							<span class="overview-project-name"><span class="dot"></span>${t('overviewProjectB')}</span>
							<span class="overview-project-dots">${capDots}</span>
						</div>
						<div class="overview-capabilities">
							<h4>${t('overviewCapabilities')}</h4>
							<div class="overview-cap-tags">
								${capabilities.map(c => `
									<span class="overview-cap-tag">
										<span class="dot" style="background:${c.color};"></span>
										${c.name}
									</span>
								`).join('')}
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="overview-benefits">
			<span class="overview-benefit"><span class="check">✓</span> ${t('overviewBenefit1')}</span>
			<span class="overview-benefit"><span class="check">✓</span> ${t('overviewBenefit2')}</span>
			<span class="overview-benefit"><span class="check">✓</span> ${t('overviewBenefit3')}</span>
			<span class="overview-benefit"><span class="check">✓</span> ${t('overviewBenefit4')}</span>
		</div>
	`;
	stage.appendChild(section);
	liveEls.push(section);

	const titleEl = section.querySelector('.overview-title');
	const card = section.querySelector('.overview-card');
	const layers = section.querySelectorAll('.overview-layer');
	const foundryBox = section.querySelector('.overview-foundry-box');
	const projects = section.querySelectorAll('.overview-project');
	const capsEl = section.querySelector('.overview-capabilities');
	const capTags = section.querySelectorAll('.overview-cap-tag');
	const benefits = section.querySelector('.overview-benefits');

	if (motionPaused) {
		gsap.set(titleEl, { opacity:1 });
		gsap.set(card, { opacity:1 });
		gsap.set(projects, { opacity:1 });
		gsap.set(capsEl, { opacity:1 });
		gsap.set(benefits, { opacity:1 });
		animating = false;
	} else {
		const tl = gsap.timeline({ onComplete: () => animating = false });
		tl.timeScale(0.4);
		liveTimelines.push(tl);

		// Title fades in
		tl.fromTo(titleEl, { opacity:0, y:-20 }, { opacity:1, y:0, duration:1.0, ease:'power2.out' });

		// Card appears
		tl.fromTo(card, { opacity:0, y:30, scale:0.95 }, { opacity:1, y:0, scale:1, duration:1.2, ease:'power2.out' }, '+=0.3');

		// Nested layers reveal (border highlight)
		layers.forEach(layer => {
			tl.fromTo(layer,
				{ borderColor:'transparent' },
				{ borderColor:'var(--theme-border)', duration:0.6, ease:'power2.out' },
				'-=0.3'
			);
		});

		// Foundry box highlight
		tl.fromTo(foundryBox,
			{ boxShadow:'0 0 0 0 rgba(212,160,208,0)' },
			{ boxShadow:'0 0 20px 4px rgba(212,160,208,0.3)', duration:0.8, ease:'power2.out' },
			'-=0.2'
		);
		tl.to(foundryBox, { boxShadow:'none', duration:0.6, ease:'power2.inOut' });

		// Projects slide in
		tl.fromTo(projects, { opacity:0, x:-20 }, { opacity:1, x:0, duration:0.8, stagger:0.3, ease:'back.out(1.4)' }, '-=0.4');

		// Capabilities section
		tl.fromTo(capsEl, { opacity:0, y:10 }, { opacity:1, y:0, duration:0.6, ease:'power2.out' }, '+=0.3');
		tl.fromTo(capTags, { opacity:0, scale:0.7 }, { opacity:1, scale:1, duration:0.5, stagger:0.12, ease:'back.out(2)' }, '-=0.2');

		// Benefits
		tl.fromTo(benefits, { opacity:0, y:15 }, { opacity:1, y:0, duration:0.8, ease:'power2.out' }, '+=0.4');
	}
}

// ── CONTROLS ───────────────────────────────
function interruptAnimation() {
	liveTimelines.forEach(t => t.kill());
	liveTimelines = [];
	animating = false;
}
function next()   { interruptAnimation(); if (current < STEPS.length-1) renderStep(current+1); }
function prev()   { interruptAnimation(); if (current > 0) renderStep(current-1); }
function reset()  { interruptAnimation(); renderStep(0); }
function replay() { if (current < 0) return; interruptAnimation(); renderStep(current); }

document.getElementById('next-btn').addEventListener('click', e => { e.stopPropagation(); next(); });
document.getElementById('prev-btn').addEventListener('click', e => { e.stopPropagation(); prev(); });
document.getElementById('reset-btn').addEventListener('click', e => { e.stopPropagation(); reset(); });
document.getElementById('replay-btn').addEventListener('click', e => { e.stopPropagation(); replay(); });

// ── Speed control ────────────────────────
const SPEED_STEPS = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIndex = SPEED_STEPS.indexOf(1);
const speedLabel = document.getElementById('speed-label');
const speedDownBtn = document.getElementById('speed-down');
const speedUpBtn   = document.getElementById('speed-up');
function syncSpeedUI() {
	const spd = SPEED_STEPS[speedIndex];
	speedLabel.textContent = spd + '\u00d7';
	speedDownBtn.disabled = speedIndex === 0;
	speedUpBtn.disabled   = speedIndex === SPEED_STEPS.length - 1;
	gsap.globalTimeline.timeScale(spd);
}
syncSpeedUI();
speedDownBtn.addEventListener('click', e => { e.stopPropagation(); if (speedIndex > 0) { speedIndex--; syncSpeedUI(); } });
speedUpBtn.addEventListener('click', e => { e.stopPropagation(); if (speedIndex < SPEED_STEPS.length-1) { speedIndex++; syncSpeedUI(); } });

// ── Keyboard ──────────────────────────────
if (window.AW && AW.keyboard) {
	AW.keyboard.bind({ next, prev, reset, replay });
} else {
	document.addEventListener('keydown', e => {
		if (['Space','ArrowRight','Enter'].includes(e.code)) { e.preventDefault(); next(); }
		else if (e.code === 'ArrowLeft') { e.preventDefault(); prev(); }
		else if (e.code === 'KeyR') { e.preventDefault(); reset(); }
		else if (e.code === 'KeyP') { e.preventDefault(); replay(); }
	});
}

// ── Resize ────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
	clearTimeout(resizeTimer);
	resizeTimer = setTimeout(() => renderStep(current), 200);
});

// ── Init ──────────────────────────────────
counter.textContent = `1 / ${STEPS.length}`;
renderStep(0);
</script>

</body>
</html>
