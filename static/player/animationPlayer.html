    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Animations Video Controls</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 40px 20px;
            color: #fff;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 0 2px 20px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        #controls, #speed-controls {
            margin-top: 20px;
        }

        button {
            font-family: inherit;
            padding: 12px 24px;
            font-size: 16px;
            margin-right: 12px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        button:hover::before {
            transform: translateX(100%);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        #playPauseButton { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-width: 130px;
        }

        #playPauseButton.playing {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        #playPauseButton i {
            margin-right: 8px;
        }

        #autoPauseButton { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        #autoPauseButton.disabled { 
            background: linear-gradient(135deg, #bdc3c7 0%, #95a5a6 100%);
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        #fullscreenButton { 
            background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%);
        }

        .speed-button {
            background: linear-gradient(135deg, #606c88 0%, #3f4c6b 100%);
            min-width: 70px;
        }

        .speed-button.active {
            background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(33, 147, 176, 0.4);
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 2rem;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .video-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            margin: 0;
            padding: 0;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 9999;
            border: none;
        }

        #myVideo {
            display: block;
            width: 100%;
            border-radius: 12px;
            background: #000;
            cursor: pointer;
        }

        .video-container.fullscreen #myVideo {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100vh;
            margin: auto;
            border-radius: 0;
        }

        .video-container:hover {
            box-shadow: 0 25px 70px rgba(0,0,0,0.35);
            transform: translateY(-5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .time-display {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            flex-wrap: wrap;
            gap: 15px;
        }

        .time-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .button-groups {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .time-display h3 {
            margin: 0;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-numbers {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .time-separator {
            margin: 0 10px;
            opacity: 0.7;
        }

        #currentTime, #duration {
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        #pauseMessage {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            font-style: italic;
            display: inline;
            margin: 0;
        }

        .control-group, .speed-control-group {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            flex: 1;
            min-width: 300px;
        }

        .control-group h3, .speed-control-group h3 {
            margin: 0;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .control-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .speed-control-group h3 {
            margin-bottom: 15px !important;
        }

        .control-tip {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
            font-weight: 400;
            font-style: italic;
            white-space: nowrap;
        }

        .control-tip i {
            margin-right: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1 id="videoTitle">Azure Animation Player</h1>
    <div class="video-container">
        <video id="myVideo">
            <source id="videoSource" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="controls-wrapper">
        <div class="time-display">
            <div class="time-info">
                <h3>Time</h3>
                <div class="time-numbers">
                    <span id="currentTime">00:00</span>
                    <span class="time-separator">/</span>
                    <span id="duration">00:00</span>
                </div>
                <span id="pauseMessage"></span>
            </div>
        </div>

        <div class="button-groups">
            <div class="control-group">
                <div class="control-header">
                    <h3>Controls</h3>
                    <p class="control-tip"><i class="fas fa-lightbulb"></i>Tip: Click video to play/pause</p>
                </div>
                <div id="controls">
                    <button id="playPauseButton">
                        <i class="fas fa-play"></i>
                        <span>Play</span>
                    </button>
                    <button id="autoPauseButton">Auto-Pause: On</button>
                    <button id="fullscreenButton">
                        <i class="fas fa-expand"></i>
                        <span>&nbsp;&nbsp;Fullscreen</span>
                    </button>
                </div>
            </div>

            <div class="speed-control-group">
                <h3>Speed</h3>
                <div id="speed-controls">
                    <button class="speed-button" data-speed="0.5">0.5x</button>
                    <button class="speed-button" data-speed="0.75">0.75x</button>
                    <button class="speed-button active" data-speed="1">1x</button>
                    <button class="speed-button" data-speed="1.25">1.25x</button>
                    <button class="speed-button" data-speed="1.5">1.5x</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Get DOM elements
        const video = document.getElementById('myVideo');
        const videoContainer = document.querySelector('.video-container');
        const pauseMessage = document.getElementById('pauseMessage');
        const playPauseButton = document.getElementById('playPauseButton');
        const autoPauseButton = document.getElementById('autoPauseButton');
        const fullscreenButton = document.getElementById('fullscreenButton');
        const speedButtons = document.querySelectorAll('.speed-button');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');

        // Get and set the title from URL parameter
        const animationTitle = getUrlParameter('animationTitle');
        if (animationTitle) {
            document.getElementById('videoTitle').textContent = animationTitle;
        }

        // Get and set video source from URL parameter
        const videoUrl = getUrlParameter('vdo');
        if (videoUrl) {
            try {
                const url = new URL(videoUrl);
                if (url.hostname === 'azureanimations.github.io') {
                    const videoSource = document.getElementById('videoSource');
                    videoSource.src = videoUrl;
                    video.load();
                } else {
                    throw new Error('Invalid video source domain');
                }
            } catch (error) {
                // Display error message
                const errorMessage = document.createElement('div');
                errorMessage.style.cssText = `
                    background-color: #ff4d4d;
                    color: white;
                    padding: 15px;
                    border-radius: 8px;
                    margin: 20px 0;
                    font-weight: 500;
                `;
                errorMessage.textContent = 'Error: Video source must be from azureanimations.github.io domain';
                
                // Insert error message after video container
                const videoContainer = document.querySelector('.video-container');
                videoContainer.insertAdjacentElement('afterend', errorMessage);
                
                // Disable play button
                playPauseButton.disabled = true;
                playPauseButton.classList.add('disabled');
                playPauseButton.style.background = '#95a5a6';
            }
        }

        // Set default playback speed
        video.playbackRate = 1;

        // Auto-pause state
        let isAutoPauseEnabled = true;

        // Format time in MM:SS format
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Update time display
        function updateTimeDisplay() {
            currentTimeDisplay.textContent = formatTime(video.currentTime);
            durationDisplay.textContent = formatTime(video.duration);
        }

        function updatePlayPauseButton(isPlaying) {
            const icon = playPauseButton.querySelector('i');
            const text = playPauseButton.querySelector('span');
            
            if (isPlaying) {
                icon.className = 'fas fa-pause';
                text.textContent = 'Pause';
                playPauseButton.classList.add('playing');
            } else {
                icon.className = 'fas fa-play';
                text.textContent = 'Play';
                playPauseButton.classList.remove('playing');
            }
        }

        function getPauseTimesFromUrl() {
            const pauseParam = getUrlParameter('pauseTimes');
            if (!pauseParam) {
                isAutoPauseEnabled = false;
                autoPauseButton.classList.add('disabled');
                autoPauseButton.textContent = 'Auto-Pause: Off';
                autoPauseButton.disabled = true;
                return null;
            }
            try {
                return pauseParam.split(',').map(time => parseFloat(time.trim()));
            } catch (e) {
                console.error('Error parsing pause times:', e);
                isAutoPauseEnabled = false;
                autoPauseButton.classList.add('disabled');
                autoPauseButton.textContent = 'Auto-Pause: Off';
                autoPauseButton.disabled = true;
                return null;
            }
        }

        const urlPauseTimes = getPauseTimesFromUrl();
        const pauseTimes = urlPauseTimes || [999999];
        let currentPauseIndex = 0;

        // Event Listeners
        playPauseButton.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });

        video.addEventListener('play', () => {
            updatePlayPauseButton(true);
            pauseMessage.textContent = '';
        });

        video.addEventListener('pause', () => {
            updatePlayPauseButton(false);
        });

        video.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });

        video.addEventListener('timeupdate', () => {
            updateTimeDisplay();
            
            if (isAutoPauseEnabled && currentPauseIndex < pauseTimes.length && 
                video.currentTime >= pauseTimes[currentPauseIndex]) {
                video.pause();
                pauseMessage.textContent = `⏸ Paused at ${pauseTimes[currentPauseIndex]}s - Click video or play button to continue`;
                currentPauseIndex++;
            }
        });

        // Update duration when metadata is loaded
        video.addEventListener('loadedmetadata', () => {
            updateTimeDisplay();
        });

        speedButtons.forEach(button => {
            button.addEventListener('click', () => {
                const speed = parseFloat(button.dataset.speed);
                video.playbackRate = speed;

                speedButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                if (speed !== 1) {
                    isAutoPauseEnabled = false;
                    autoPauseButton.classList.add('disabled');
                    autoPauseButton.textContent = 'Auto-Pause: Off';
                    pauseMessage.textContent = '';
                }
            });
        });

        autoPauseButton.addEventListener('click', () => {
            if (video.playbackRate !== 1) {
                alert('Auto-pause is only available at 1x speed');
                return;
            }

            isAutoPauseEnabled = !isAutoPauseEnabled;
            autoPauseButton.textContent = `Auto-Pause: ${isAutoPauseEnabled ? 'On' : 'Off'}`;
            autoPauseButton.classList.toggle('disabled', !isAutoPauseEnabled);
            
            if (!isAutoPauseEnabled) {
                pauseMessage.textContent = '';
            }
        });

        fullscreenButton.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) {
                    videoContainer.requestFullscreen();
                } else if (videoContainer.webkitRequestFullscreen) {
                    videoContainer.webkitRequestFullscreen();
                } else if (videoContainer.mozRequestFullScreen) {
                    videoContainer.mozRequestFullScreen();
                } else if (videoContainer.msRequestFullscreen) {
                    videoContainer.msRequestFullscreen();
                }
                videoContainer.classList.add('fullscreen');
                fullscreenButton.querySelector('i').className = 'fas fa-compress';
                fullscreenButton.querySelector('span').textContent = 'Exit Fullscreen';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                videoContainer.classList.remove('fullscreen');
                fullscreenButton.querySelector('i').className = 'fas fa-expand';
                fullscreenButton.querySelector('span').textContent = 'Fullscreen';
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                videoContainer.classList.remove('fullscreen');
                fullscreenButton.querySelector('i').className = 'fas fa-expand';
                fullscreenButton.querySelector('span').textContent = 'Fullscreen';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });
    </script>
</body>
